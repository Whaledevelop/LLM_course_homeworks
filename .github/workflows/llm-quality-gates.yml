name: LLM quality gates

on:
  push:
    paths:
      - "19_testing_LLM/**"
      - ".github/workflows/llm-quality-gates.yml"
  pull_request:
    paths:
      - "19_testing_LLM/**"
      - ".github/workflows/llm-quality-gates.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 19_testing_LLM

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run demo evaluation
        run: python scripts/run_demo.py --rebuild-data

      - name: Run quality gates
        run: python -m pytest -q

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-quality-reports
          path: |
            19_testing_LLM/data/ragas_results.json
            19_testing_LLM/data/ragas_results.html
